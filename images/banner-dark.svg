<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230">
  <style>
    .display { font-family: 'Arial Black', 'Segoe UI Black', sans-serif; font-weight: 900; }
    .body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .body-bold { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
    .upper { text-transform: uppercase; }
  </style>
  <style>
    /* Entrance animations matching the website hero */
    @keyframes wipeReveal {
      from { clip-path: inset(0 100% 0 0); opacity: 0; }
      to { clip-path: inset(0 0 0 0); opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      60% { opacity: 1; transform: translateY(-3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-name { animation: slideUp 0.4s ease-out 0.2s both; }
    .anim-sw { animation: wipeReveal 0.5s ease-out 0.35s both; }
    .anim-eng { animation: wipeReveal 0.5s ease-out 0.55s both; }
    .anim-tag { animation: slideUp 0.5s ease-out 0.7s both; }
  </style>

  <!-- Name label — small, like the hero-name on the site -->
  <g class="anim-name" transform="translate(350, 15)">
    <rect x="3" y="3" width="200" height="30" fill="rgba(0,0,0,0.6)"/>
    <rect width="200" height="30" fill="#ffee00" stroke="#000000" stroke-width="2"/>
    <text x="100" y="21" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="12" letter-spacing="2">MORTEN OLSEN</text>
  </g>

  <!-- SOFTWARE block — rotated -2deg like hero -->
  <g class="anim-sw" transform="rotate(-2 450 75)">
    <rect x="266" y="61" width="380" height="60" fill="rgba(0,0,0,0.6)"/>
    <rect x="260" y="55" width="380" height="60" fill="#ffee00" stroke="#000000" stroke-width="4"/>
    <text x="450" y="95" text-anchor="middle" class="display upper" fill="#000000" font-size="46">SOFTWARE</text>
  </g>

  <!-- ENGINEER block — rotated 1deg like hero -->
  <g class="anim-eng" transform="rotate(1 450 135)">
    <rect x="286" y="126" width="340" height="50" fill="rgba(0,0,0,0.6)"/>
    <rect x="280" y="120" width="340" height="50" fill="#00d4ff" stroke="#000000" stroke-width="4"/>
    <text x="450" y="153" text-anchor="middle" class="display upper" fill="#000000" font-size="38">ENGINEER</text>
  </g>

  <!-- Tagline — like hero-desc with lavender bg -->
  <g class="anim-tag" transform="translate(230, 182)">
    <rect x="3" y="3" width="440" height="32" fill="rgba(0,0,0,0.6)"/>
    <rect width="440" height="32" fill="#e4c1f9" stroke="#000000" stroke-width="2"/>
    <text x="220" y="22" text-anchor="middle" class="body-bold" fill="#000000" font-size="13">I make computers do questionable things.</text>
  </g>
</svg>