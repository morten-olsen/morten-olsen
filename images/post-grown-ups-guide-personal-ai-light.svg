  <text x="20" y="232" class="desc">Handing the keys to your digital life to an AI is</text>
  <text x="20" y="248" class="desc">like juggling chainsaws. I built a persistent</text>
  <text x="20" y="264" class="desc">assistant that knows me, but without the ability</text>
