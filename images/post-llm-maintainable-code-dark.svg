<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="440" height="298" viewBox="0 0 440 298">
  <style>
    .title { font-family: 'Arial Black', 'Helvetica Neue', sans-serif; font-weight: 900; font-size: 17px; text-transform: uppercase; fill: #f0f0e8; }
    .desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #a0a0b0; }
    .date { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #a0a0b0; text-transform: uppercase; }
  </style>
  <rect width="440" height="298" rx="0" fill="#16213e" stroke="#f0f0e8" stroke-width="4"/>
  <!-- Hero image -->
  <image href="data:image/jpeg;base64," x="4" y="4" width="432" height="150" preserveAspectRatio="xMidYMid slice"/>
  <line x1="4" y1="154" x2="436" y2="154" stroke="#f0f0e8" stroke-width="3"/>
  <!-- Accent stripe -->
  <rect x="4" y="154" width="432" height="4" fill="#e4c1f9"/>
  <!-- Title -->
  <text x="20" y="180" class="title">Why AI Hates Your Abstractions</text>
  <!-- Description -->
  <text x="20" y="210" class="desc">I refactored my personal AI to be &quot;more</text>
  <text x="20" y="226" class="desc">maintainable&quot; for humans, only to find out I might</text>
  <text x="20" y="242" class="desc">have broken its brain. Is what we call good code</text>
  <!-- Date -->
  <text x="20" y="286" class="date">Feb 2026</text>
</svg>