<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#f0f0e8"/>
  
    <!-- Editions -->
    <rect x="20" y="20" width="860" height="100" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="20" y="20" width="6" height="100" fill="#ffee00"/>
    <rect x="40" y="32" width="116" height="28" fill="#ffee00" stroke="#000000" stroke-width="2"/>
    <text x="50" y="52" font-family="'Arial Black', sans-serif" font-weight="900" font-size="15" fill="#000000" text-transform="uppercase">EDITIONS</text>
    <rect x="156" y="35" width="56" height="22" fill="#ffee00" stroke="#000000" stroke-width="2"/><text x="164" y="51" font-family="'Helvetica Neue', sans-serif" font-weight="700" font-size="10" fill="#000000">ALPHA</text>
    <text x="40" y="75" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">A self-hosted news reader that assembles RSS feeds into finite, curated</text>
    <text x="40" y="90" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">magazines using on-device ML for article classification.</text>
    <text x="40" y="110" font-family="'Helvetica Neue', sans-serif" font-size="10" fill="#555555" font-weight="600">TypeScript · React · Vite · Tailwind CSS · Fastify · SQLite</text>
    <!-- Grimoire -->
    <rect x="20" y="140" width="860" height="100" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="20" y="140" width="6" height="100" fill="#00d4ff"/>
    <rect x="40" y="152" width="116" height="28" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
    <text x="50" y="172" font-family="'Arial Black', sans-serif" font-weight="900" font-size="15" fill="#000000" text-transform="uppercase">GRIMOIRE</text>
    <rect x="156" y="155" width="64" height="22" fill="#00d4ff" stroke="#000000" stroke-width="2"/><text x="164" y="171" font-family="'Helvetica Neue', sans-serif" font-weight="700" font-size="10" fill="#000000">ACTIVE</text>
    <text x="40" y="195" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">A Bitwarden-compatible CLI, SSH agent, and daemon for Vaultwarden — built</text>
    <text x="40" y="210" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">for engineers who want their secrets served from memory, not files on disk.</text>
    <text x="40" y="230" font-family="'Helvetica Neue', sans-serif" font-size="10" fill="#555555" font-weight="600">Rust · X25519 · ChaCha20-Poly1305 · Swift · GTK4</text>
    <!-- Homelab Core -->
    <rect x="20" y="260" width="860" height="100" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="20" y="260" width="6" height="100" fill="#c8ff00"/>
    <rect x="40" y="272" width="164" height="28" fill="#c8ff00" stroke="#000000" stroke-width="2"/>
    <text x="50" y="292" font-family="'Arial Black', sans-serif" font-weight="900" font-size="15" fill="#000000" text-transform="uppercase">HOMELAB CORE</text>
    <rect x="204" y="275" width="64" height="22" fill="#00d4ff" stroke="#000000" stroke-width="2"/><text x="212" y="291" font-family="'Helvetica Neue', sans-serif" font-weight="700" font-size="10" fill="#000000">ACTIVE</text>
    <text x="40" y="315" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">A Kubernetes-based homelab infrastructure stack using Helm charts and</text>
    <text x="40" y="330" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#555555">ArgoCD for GitOps-driven home server management.</text>
    <text x="40" y="350" font-family="'Helvetica Neue', sans-serif" font-size="10" fill="#555555" font-weight="600">Kubernetes · Helm · ArgoCD · Terraform · Istio · Prometheus</text>
</svg>