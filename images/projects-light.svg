<svg xmlns="http://www.w3.org/2000/svg" width="900" height="409" viewBox="0 0 900 409">
  <defs>
    <pattern id="g-light" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#f0f0e8"/>
  <rect width="100%" height="100%" fill="url(#g-light)"/>
  <style>
    .display { font-family: 'Arial Black', 'Segoe UI Black', sans-serif; font-weight: 900; }
    .body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .body-bold { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
    .upper { text-transform: uppercase; }
  </style>
  
  <!-- Editions -->
  <rect x="21" y="21" width="868" height="110" fill="#1a1a1a" rx="0"/>
  <rect x="16" y="16" width="868" height="110" fill="#ffffff" stroke="#1a1a1a" stroke-width="3" rx="0"/>
  <rect x="16" y="16" width="8" height="110" fill="#ffee00" stroke="#1a1a1a" stroke-width="0"/>
  <rect x="29" y="41" width="102.39999999999999" height="26" fill="#1a1a1a"/>
  <rect x="24" y="36" width="102.39999999999999" height="26" fill="#ffee00" stroke="#000000" stroke-width="2"/>
  <text x="75.19999999999999" y="54" text-anchor="middle" class="display upper" fill="#000000" font-size="14">EDITIONS</text>
  <rect x="136.39999999999998" y="38" width="43.5" height="20" fill="#ffee00" stroke="#000000" stroke-width="2"/>
    <text x="158.14999999999998" y="52" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="9">ALPHA</text>
  <text x="36" y="78" class="body" fill="#6b6b6b" font-size="12">A self-hosted news reader that assembles RSS feeds into finite, curated magazines</text>
  <text x="36" y="95" class="body" fill="#6b6b6b" font-size="12">using on-device ML for article classification.</text>
  <text x="36" y="110" class="body-bold" fill="#6b6b6b" font-size="10" letter-spacing="0.5">TypeScript  ·  React  ·  Vite  ·  Tailwind CSS  ·  Fastify  ·  SQLite  ·  Transformers.js</text>
  <!-- Grimoire -->
  <rect x="21" y="152" width="868" height="110" fill="#1a1a1a" rx="0"/>
  <rect x="16" y="147" width="868" height="110" fill="#ffffff" stroke="#1a1a1a" stroke-width="3" rx="0"/>
  <rect x="16" y="147" width="8" height="110" fill="#00d4ff" stroke="#1a1a1a" stroke-width="0"/>
  <rect x="29" y="172" width="102.39999999999999" height="26" fill="#1a1a1a"/>
  <rect x="24" y="167" width="102.39999999999999" height="26" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
  <text x="75.19999999999999" y="185" text-anchor="middle" class="display upper" fill="#000000" font-size="14">GRIMOIRE</text>
  <rect x="136.39999999999998" y="169" width="49" height="20" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
    <text x="160.89999999999998" y="183" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="9">ACTIVE</text>
  <text x="36" y="209" class="body" fill="#6b6b6b" font-size="12">A Bitwarden-compatible CLI, SSH agent, and daemon for Vaultwarden — built for</text>
  <text x="36" y="226" class="body" fill="#6b6b6b" font-size="12">engineers who want their secrets served from memory, not files on disk.</text>
  <text x="36" y="241" class="body-bold" fill="#6b6b6b" font-size="10" letter-spacing="0.5">Rust  ·  X25519  ·  ChaCha20-Poly1305  ·  Swift  ·  GTK4</text>
  <!-- Homelab Core -->
  <rect x="21" y="283" width="868" height="110" fill="#1a1a1a" rx="0"/>
  <rect x="16" y="278" width="868" height="110" fill="#ffffff" stroke="#1a1a1a" stroke-width="3" rx="0"/>
  <rect x="16" y="278" width="8" height="110" fill="#c8ff00" stroke="#1a1a1a" stroke-width="0"/>
  <rect x="29" y="303" width="141.6" height="26" fill="#1a1a1a"/>
  <rect x="24" y="298" width="141.6" height="26" fill="#c8ff00" stroke="#000000" stroke-width="2"/>
  <text x="94.8" y="316" text-anchor="middle" class="display upper" fill="#000000" font-size="14">HOMELAB CORE</text>
  <rect x="175.6" y="300" width="49" height="20" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
    <text x="200.1" y="314" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="9">ACTIVE</text>
  <text x="36" y="340" class="body" fill="#6b6b6b" font-size="12">A Kubernetes-based homelab infrastructure stack using Helm charts and ArgoCD for</text>
  <text x="36" y="357" class="body" fill="#6b6b6b" font-size="12">GitOps-driven home server management.</text>
  <text x="36" y="372" class="body-bold" fill="#6b6b6b" font-size="10" letter-spacing="0.5">Kubernetes  ·  Helm  ·  ArgoCD  ·  Terraform  ·  Istio  ·  Prometheus  ·  Grafana</text>
</svg>