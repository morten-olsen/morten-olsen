<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
  <style>
    .display { font-family: 'Arial Black', 'Segoe UI Black', sans-serif; font-weight: 900; }
    .body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .body-bold { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
    .upper { text-transform: uppercase; }
  </style>
  
  <!-- Editions -->
  <g transform="rotate(-0.4 450 70)">
  <rect x="6" y="16" width="900" height="120" fill="#000000"/>
  <rect x="0" y="10" width="900" height="120" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <!-- Name badge with shadow -->
  <rect x="23" y="33" width="105.60000000000001" height="28" fill="#000000"/>
  <rect x="20" y="30" width="105.60000000000001" height="28" fill="#ffee00" stroke="#000000" stroke-width="2"/>
  <text x="72.80000000000001" y="49" text-anchor="middle" class="display upper" fill="#000000" font-size="15">EDITIONS</text>
  <rect x="143.60000000000002" y="31" width="43.5" height="24" fill="#ffee00" stroke="#000000" stroke-width="2"/>
    <text x="165.35000000000002" y="47" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="10">ALPHA</text>
  <text x="20" y="78" class="body" fill="#555555" font-size="13">A self-hosted news reader that assembles RSS feeds into finite, curated magazines using</text>
  <text x="20" y="95" class="body" fill="#555555" font-size="13">on-device ML for article classification.</text>
  <text x="20" y="116" class="body-bold" fill="#555555" font-size="11" letter-spacing="0.3">TypeScript  ·  React  ·  Vite  ·  Tailwind CSS  ·  Fastify  ·  SQLite  ·  Transformers.js</text>
  </g>
  <!-- Grimoire -->
  <g transform="rotate(0.6 450 212)">
  <rect x="6" y="158" width="900" height="120" fill="#000000"/>
  <rect x="0" y="152" width="900" height="120" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <!-- Name badge with shadow -->
  <rect x="23" y="175" width="105.60000000000001" height="28" fill="#000000"/>
  <rect x="20" y="172" width="105.60000000000001" height="28" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
  <text x="72.80000000000001" y="191" text-anchor="middle" class="display upper" fill="#000000" font-size="15">GRIMOIRE</text>
  <rect x="143.60000000000002" y="173" width="49" height="24" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
    <text x="168.10000000000002" y="189" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="10">ACTIVE</text>
  <text x="20" y="220" class="body" fill="#555555" font-size="13">A Bitwarden-compatible CLI, SSH agent, and daemon for Vaultwarden — built for engineers</text>
  <text x="20" y="237" class="body" fill="#555555" font-size="13">who want their secrets served from memory, not files on disk.</text>
  <text x="20" y="258" class="body-bold" fill="#555555" font-size="11" letter-spacing="0.3">Rust  ·  X25519  ·  ChaCha20-Poly1305  ·  Swift  ·  GTK4</text>
  </g>
  <!-- Homelab Core -->
  <g transform="rotate(-0.3 450 354)">
  <rect x="6" y="300" width="900" height="120" fill="#000000"/>
  <rect x="0" y="294" width="900" height="120" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <!-- Name badge with shadow -->
  <rect x="23" y="317" width="146.4" height="28" fill="#000000"/>
  <rect x="20" y="314" width="146.4" height="28" fill="#c8ff00" stroke="#000000" stroke-width="2"/>
  <text x="93.2" y="333" text-anchor="middle" class="display upper" fill="#000000" font-size="15">HOMELAB CORE</text>
  <rect x="184.4" y="315" width="49" height="24" fill="#00d4ff" stroke="#000000" stroke-width="2"/>
    <text x="208.9" y="331" text-anchor="middle" class="body-bold upper" fill="#000000" font-size="10">ACTIVE</text>
  <text x="20" y="362" class="body" fill="#555555" font-size="13">A Kubernetes-based homelab infrastructure stack using Helm charts and ArgoCD for</text>
  <text x="20" y="379" class="body" fill="#555555" font-size="13">GitOps-driven home server management.</text>
  <text x="20" y="400" class="body-bold" fill="#555555" font-size="11" letter-spacing="0.3">Kubernetes  ·  Helm  ·  ArgoCD  ·  Terraform  ·  Istio  ·  Prometheus  ·  Grafana</text>
  </g>
</svg>