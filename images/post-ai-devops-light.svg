<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="440" height="320" viewBox="0 0 440 320">
  <style>
    .title { font-family: 'Arial Black', 'Helvetica Neue', sans-serif; font-weight: 900; font-size: 17px; text-transform: uppercase; fill: #000000; }
    .desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #555555; }
    .date { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #555555; text-transform: uppercase; }
  </style>
  <rect width="440" height="320" rx="0" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <!-- Hero image -->
  <image href="data:image/jpeg;base64," x="4" y="4" width="432" height="150" preserveAspectRatio="xMidYMid slice"/>
  <line x1="4" y1="154" x2="436" y2="154" stroke="#000000" stroke-width="3"/>
  <!-- Accent stripe -->
  <rect x="4" y="154" width="432" height="4" fill="#e4c1f9"/>
  <!-- Title -->
  <text x="20" y="180" class="title">I gave an AI Root access to my</text>
  <text x="20" y="202" class="title">Kubernetes Cluster</text>
  <!-- Description -->
  <text x="20" y="232" class="desc">I gave an AI root access to my Kubernetes cluster.</text>
  <text x="20" y="248" class="desc">It fixed a BIOS issue I didn’t know I had. I am</text>
  <text x="20" y="264" class="desc">still terrified.</text>
  <!-- Date -->
  <text x="20" y="308" class="date">Jan 2026</text>
</svg>